<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard | ERP</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151921;
            --accent-blue: #007bff;
            --text-main: #ffffff;
            --text-dim: #a0aec0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            background: var(--card-bg);
            padding: 20px;
            border-right: 1px solid #2d3748;
        }
        .main-content {
            flex: 1;
            padding: 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-blue);
        }
        .stat { font-size: 2rem; font-weight: bold; color: var(--accent-blue); }
        .nav-item { padding: 15px; color: var(--text-dim); cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .nav-item.active { background: #1e2530; color: var(--accent-blue); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ERP Portal</h2>
        <div class="nav-item active">Dashboard</div>
        <div class="nav-item">Registration</div>
        <div class="nav-item">Attendance</div>
        <div class="nav-item">Results</div>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>Welcome back, {{ student.first_name }}</h1>
            <div style="color: var(--accent-blue)">Roll No: {{ student.username }}</div>
        </div>
        
        <div class="card-grid">
            <div class="card">
                <div style="color: var(--text-dim)">Enrolled Courses</div>
                <div class="stat">{{ courses_count }}</div>
            </div>
            <div class="card">
                <div style="color: var(--text-dim)">Attendance Status</div>
                <div class="stat">{{ attendance_percent }}%</div>
            </div>
            <div class="card">
                <div style="color: var(--text-dim)">Current Semester</div>
                <div class="stat">02</div>
            </div>
        </div>
    </div>
</body>
</html>
